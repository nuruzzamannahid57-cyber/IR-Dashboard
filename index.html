<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IR Dashboard - Incident Response</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-card: #0f3460;
    --accent: #ffc800;
    --accent-hover: #e6b400;
    --accent-glow: rgba(255, 200, 0, 0.15);
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --border: #2d3748;
    --bee-dark: #3a3a3a;
    --bee-yellow: #ffc800;
    --bee-yellow-light: #ffd633;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .ir-dashboard {
    padding: 24px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .dashboard-title {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #ffc800, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 0 1px rgba(255, 200, 0, 0.1);
  }

  .stat-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .stat-value.success { color: var(--success); }
  .stat-value.warning { color: var(--accent); }
  .stat-value.danger { color: var(--danger); }

  .section-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .incidents-table-container {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 32px;
  }

  .toolbar {
    display: flex;
    gap: 12px;
    padding: 16px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }

  .search-box {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text-primary);
    font-size: 14px;
    min-width: 280px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-box:focus {
    border-color: var(--accent);
  }

  .filter-select {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text-primary);
    font-size: 14px;
    cursor: pointer;
    outline: none;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover {
    background: var(--accent-hover);
    box-shadow: 0 0 20px rgba(255, 200, 0, 0.3);
  }

  .btn-success {
    background: var(--success);
    color: white;
  }

  .btn-success:hover {
    background: #059669;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }

  .btn-ghost:hover {
    background: var(--bg-card);
    color: var(--text-primary);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th {
    background: var(--bg-card);
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  th:hover {
    color: var(--text-primary);
  }

  td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  tr:hover td {
    background: rgba(255, 200, 0, 0.05);
  }

  .mail-subject {
    font-weight: 500;
    color: var(--text-primary);
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    gap: 4px;
  }

  .badge-open {
    background: rgba(255, 200, 0, 0.15);
    color: var(--accent);
  }

  .badge-solved {
    background: rgba(16, 185, 129, 0.15);
    color: var(--success);
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: inline-block;
  }

  .badge-open .badge-dot { background: var(--accent); }
  .badge-solved .badge-dot { background: var(--success); }

  .assignee-select {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
    outline: none;
    min-width: 140px;
  }

  .assignee-select:focus {
    border-color: var(--accent);
  }

  .date-cell {
    color: var(--text-secondary);
    font-size: 13px;
    font-family: 'SF Mono', monospace;
  }

  .date-cell.solved {
    color: var(--success);
  }

  .action-btns {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .btn-icon:hover {
    background: var(--bg-card);
    color: var(--text-primary);
  }

  .btn-icon.solve:hover {
    background: rgba(16, 185, 129, 0.15);
    color: var(--success);
    border-color: var(--success);
  }

  .btn-icon.delete:hover {
    background: rgba(239, 68, 68, 0.15);
    color: var(--danger);
    border-color: var(--danger);
  }

  .team-section {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 32px;
  }

  .team-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.3s ease;
  }
  .team-card:hover {
    border-color: rgba(255, 200, 0, 0.3);
    box-shadow: 0 4px 20px rgba(255, 200, 0, 0.05);
  }

  .team-member {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .team-member:last-child {
    border-bottom: none;
  }

  .member-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffc800, #ff8c00);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 14px;
    color: white;
  }

  .member-name {
    font-weight: 500;
    color: var(--text-primary);
  }

  .member-role {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .member-stats {
    text-align: right;
  }

  .member-solved {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .member-total {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .ratio-bar {
    width: 100%;
    height: 8px;
    background: var(--bg-primary);
    border-radius: 4px;
    margin-top: 8px;
    overflow: hidden;
  }

  .ratio-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, #ffc800, #ff8c00);
    transition: width 0.5s ease;
  }

  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(26, 26, 46, 0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 24px 48px rgba(0,0,0,0.4);
  }

  .modal-title {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .form-input {
    width: 100%;
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    box-sizing: border-box;
  }

  .form-input:focus {
    border-color: var(--accent);
  }

  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }

  .empty-state-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 16px;
    border-top: 1px solid var(--border);
  }

  .page-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-primary);
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }

  .page-btn:hover {
    background: var(--bg-card);
    color: var(--text-primary);
  }

  .page-btn.active {
    background: var(--accent);
    color: #1a1a2e;
    border-color: var(--accent);
    font-weight: 700;
  }

  .page-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 2000;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast-icon {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .toast-success .toast-icon { background: rgba(255, 200, 0, 0.15); color: var(--accent); }
  .toast-info .toast-icon { background: rgba(59, 130, 246, 0.15); color: var(--accent); }

  .toast-content {
    flex: 1;
  }

  .toast-title {
    font-weight: 600;
    font-size: 14px;
    color: var(--text-primary);
  }

  .toast-message {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  .sort-indicator {
    margin-left: 4px;
    opacity: 0.5;
  }

  .checkbox-wrapper {
    display: flex;
    align-items: center;
  }

  .custom-checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: white;
    font-size: 11px;
  }

  .custom-checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1a2e;
  }

  .bulk-actions {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: rgba(255, 200, 0, 0.05);
    border-bottom: 1px solid var(--border);
  }

  .bulk-actions.active {
    display: flex;
  }

  .bulk-count {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
</style>
<base target="_blank">
</head>
<body>

<div class="ir-dashboard" id="irDashboard">
  <div class="dashboard-header">
    <div style="display: flex; align-items: center; gap: 16px;">
      <img src="Carrybee Logo-04.png" alt="Carrybee" style="height: 48px; width: auto; object-fit: contain;">
      <div>
        <div class="dashboard-title">IR Dashboard</div>
        <div style="color: var(--text-secondary); font-size: 14px; margin-top: 4px;">Incident Response Command Center</div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="openAddModal()">
      <span>+</span> Add Incident
    </button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total Incidents</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Open</div>
      <div class="stat-value warning" id="statOpen">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Solved</div>
      <div class="stat-value success" id="statSolved">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Resolution</div>
      <div class="stat-value" id="statAvgTime">0h</div>
    </div>
  </div>

  <div class="section-title" style="color: var(--accent);">
    <span style="margin-right: 8px;">&#9670;</span> Team Performance
  </div>
  <div class="team-section" id="teamSection"></div>

  <div class="section-title" style="color: var(--accent);">
    <span style="margin-right: 8px;">&#9670;</span> Mail Incidents
  </div>
  <div class="incidents-table-container">
    <div class="toolbar">
      <input type="text" class="search-box" id="searchBox" placeholder="Search mail subjects..." oninput="filterIncidents()">
      <select class="filter-select" id="statusFilter" onchange="filterIncidents()">
        <option value="all">All Status</option>
        <option value="open">Open</option>
        <option value="solved">Solved</option>
      </select>
      <select class="filter-select" id="assigneeFilter" onchange="filterIncidents()">
        <option value="all">All Assignees</option>
      </select>
      <button class="btn btn-ghost" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="bulk-actions" id="bulkActions">
      <span class="bulk-count" id="bulkCount">0 selected</span>
      <button class="btn btn-success" onclick="bulkSolve()">Mark Solved</button>
      <button class="btn btn-ghost" onclick="clearSelection()">Clear</button>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width: 40px;">
            <div class="checkbox-wrapper">
              <div class="custom-checkbox" id="selectAll" onclick="toggleSelectAll()"></div>
            </div>
          </th>
          <th onclick="sortBy('subject')">Mail Subject <span class="sort-indicator" id="sort-subject">&#8597;</span></th>
          <th onclick="sortBy('assignee')">Assignee <span class="sort-indicator" id="sort-assignee">&#8597;</span></th>
          <th onclick="sortBy('created')">Created <span class="sort-indicator" id="sort-created">&#8597;</span></th>
          <th onclick="sortBy('solved')">Solved <span class="sort-indicator" id="sort-solved">&#8597;</span></th>
          <th onclick="sortBy('status')">Status <span class="sort-indicator" id="sort-status">&#8597;</span></th>
          <th style="width: 120px;">Actions</th>
        </tr>
      </thead>
      <tbody id="incidentsTable"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- Add Incident Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">Add New Incident</div>
    <div class="form-group">
      <label class="form-label">Mail Subject</label>
      <input type="text" class="form-input" id="newSubject" placeholder="Enter mail subject line...">
    </div>
    <div class="form-group">
      <label class="form-label">Assign To</label>
      <select class="form-input" id="newAssignee"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Created Date</label>
      <input type="datetime-local" class="form-input" id="newCreated">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addIncident()">Add Incident</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-icon" id="toastIcon">&#10003;</div>
  <div class="toast-content">
    <div class="toast-title" id="toastTitle">Success</div>
    <div class="toast-message" id="toastMessage">Operation completed</div>
  </div>
</div>

<script>
// ===================== DATA STORE =====================
let teamMembers = [
  { id: 'you', name: 'You (Admin)', role: 'Lead', initials: 'YO' },
  { id: 'alice', name: 'Alice Chen', role: 'Security Analyst', initials: 'AC' },
  { id: 'bob', name: 'Bob Smith', role: 'SOC Analyst', initials: 'BS' },
  { id: 'carol', name: 'Carol White', role: 'Incident Handler', initials: 'CW' },
  { id: 'dave', name: 'Dave Kumar', role: 'Forensics', initials: 'DK' }
];

let incidents = [
  { id: 1, subject: 'URGENT: Suspicious login from IP 192.168.1.45', assignee: 'alice', created: '2026-07-10T09:30:00', solved: '2026-07-10T14:20:00', status: 'solved' },
  { id: 2, subject: 'Phishing attempt detected in finance@company.com', assignee: 'bob', created: '2026-07-11T08:15:00', solved: null, status: 'open' },
  { id: 3, subject: 'Malware alert: Trojan.Win32.Generic detected', assignee: 'you', created: '2026-07-11T11:45:00', solved: '2026-07-11T16:30:00', status: 'solved' },
  { id: 4, subject: 'DDoS attack on API gateway - 50k req/s', assignee: 'carol', created: '2026-07-12T02:00:00', solved: null, status: 'open' },
  { id: 5, subject: 'Data exfiltration attempt via DNS tunneling', assignee: 'dave', created: '2026-07-12T14:20:00', solved: '2026-07-13T09:10:00', status: 'solved' },
  { id: 6, subject: 'Ransomware indicators on workstation WS-4421', assignee: 'you', created: '2026-07-13T07:00:00', solved: null, status: 'open' },
  { id: 7, subject: 'Unauthorized AWS S3 bucket policy change', assignee: 'alice', created: '2026-07-13T10:30:00', solved: null, status: 'open' },
  { id: 8, subject: 'CVE-2026-1234 exploit attempt on web server', assignee: 'bob', created: '2026-07-13T13:15:00', solved: '2026-07-13T15:45:00', status: 'solved' },
  { id: 9, subject: 'Insider threat: unusual file access pattern', assignee: 'carol', created: '2026-07-13T16:00:00', solved: null, status: 'open' },
  { id: 10, subject: 'SSL certificate expiry warning - prod.api.com', assignee: 'dave', created: '2026-07-13T18:30:00', solved: null, status: 'open' },
  { id: 11, subject: 'Brute force attack on VPN portal', assignee: 'you', created: '2026-07-13T20:00:00', solved: '2026-07-13T22:15:00', status: 'solved' },
  { id: 12, subject: 'SIEM alert: Privilege escalation on DC01', assignee: 'alice', created: '2026-07-13T21:45:00', solved: null, status: 'open' }
];

let selectedIds = new Set();
let currentSort = { field: 'created', dir: 'desc' };
let currentPage = 1;
const perPage = 8;

// ===================== INIT =====================
function init() {
  populateAssigneeFilters();
  renderTeamStats();
  renderTable();
  updateStats();
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('newCreated').value = now.toISOString().slice(0, 16);
}

function populateAssigneeFilters() {
  const filter = document.getElementById('assigneeFilter');
  const modalSelect = document.getElementById('newAssignee');
  teamMembers.forEach(m => {
    filter.innerHTML += `<option value="${m.id}">${m.name}</option>`;
    modalSelect.innerHTML += `<option value="${m.id}">${m.name}</option>`;
  });
}

// ===================== RENDERING =====================
function renderTeamStats() {
  const container = document.getElementById('teamSection');
  const stats = {};
  teamMembers.forEach(m => { stats[m.id] = { total: 0, solved: 0 }; });
  incidents.forEach(inc => {
    if (stats[inc.assignee]) {
      stats[inc.assignee].total++;
      if (inc.status === 'solved') stats[inc.assignee].solved++;
    }
  });
  container.innerHTML = teamMembers.map(m => {
    const s = stats[m.id];
    const ratio = s.total > 0 ? Math.round((s.solved / s.total) * 100) : 0;
    return `
      <div class="team-card">
        <div class="team-member">
          <div class="member-info">
            <div class="avatar">${m.initials}</div>
            <div>
              <div class="member-name">${m.name}</div>
              <div class="member-role">${m.role}</div>
            </div>
          </div>
          <div class="member-stats">
            <div class="member-solved">${s.solved}/${s.total}</div>
            <div class="member-total">resolved</div>
          </div>
        </div>
        <div class="ratio-bar">
          <div class="ratio-fill" style="width: ${ratio}%"></div>
        </div>
        <div style="text-align: right; font-size: 12px; color: var(--text-secondary); margin-top: 4px;">
          ${ratio}% resolution rate
        </div>
      </div>
    `;
  }).join('');
}

function getFilteredIncidents() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const assignee = document.getElementById('assigneeFilter').value;
  let filtered = incidents.filter(inc => {
    if (search && !inc.subject.toLowerCase().includes(search)) return false;
    if (status !== 'all' && inc.status !== status) return false;
    if (assignee !== 'all' && inc.assignee !== assignee) return false;
    return true;
  });
  filtered.sort((a, b) => {
    let va = a[currentSort.field];
    let vb = b[currentSort.field];
    if (va === null) va = '';
    if (vb === null) vb = '';
    if (currentSort.field === 'created' || currentSort.field === 'solved') {
      va = va || '9999';
      vb = vb || '9999';
    }
    if (va < vb) return currentSort.dir === 'asc' ? -1 : 1;
    if (va > vb) return currentSort.dir === 'asc' ? 1 : -1;
    return 0;
  });
  return filtered;
}

function renderTable() {
  const filtered = getFilteredIncidents();
  const totalPages = Math.ceil(filtered.length / perPage);
  const start = (currentPage - 1) * perPage;
  const pageItems = filtered.slice(start, start + perPage);
  const tbody = document.getElementById('incidentsTable');
  if (pageItems.length === 0) {
    tbody.innerHTML = `
      <tr><td colspan="7">
        <div class="empty-state">
          <div class="empty-state-icon" style="color: var(--accent);">&#9670;</div>
          <div>No incidents found matching your filters.</div>
        </div>
      </td></tr>`;
  } else {
    tbody.innerHTML = pageItems.map(inc => {
      const assignee = teamMembers.find(m => m.id === inc.assignee);
      const created = formatDate(inc.created);
      const solved = inc.solved ? formatDate(inc.solved) : '-';
      const isSelected = selectedIds.has(inc.id);
      return `
        <tr>
          <td>
            <div class="checkbox-wrapper">
              <div class="custom-checkbox ${isSelected ? 'checked' : ''}" onclick="toggleSelect(${inc.id})">
                ${isSelected ? '&#10003;' : ''}
              </div>
            </div>
          </td>
          <td><div class="mail-subject" title="${inc.subject}">${inc.subject}</div></td>
          <td>
            <select class="assignee-select" onchange="reassign(${inc.id}, this.value)">
              ${teamMembers.map(m => `<option value="${m.id}" ${m.id === inc.assignee ? 'selected' : ''}>${m.name}</option>`).join('')}
            </select>
          </td>
          <td class="date-cell">${created}</td>
          <td class="date-cell ${inc.solved ? 'solved' : ''}">${solved}</td>
          <td>
            <span class="badge badge-${inc.status}">
              <span class="badge-dot"></span>
              ${inc.status.toUpperCase()}
            </span>
          </td>
          <td>
            <div class="action-btns">
              ${inc.status === 'open' ? `<button class="btn-icon solve" onclick="solveIncident(${inc.id})" title="Mark Solved">&#10003;</button>` : ''}
              <button class="btn-icon delete" onclick="deleteIncident(${inc.id})" title="Delete">&#128465;</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }
  renderPagination(totalPages);
  updateBulkActions();
}

function renderPagination(totalPages) {
  const container = document.getElementById('pagination');
  if (totalPages <= 1) { container.innerHTML = ''; return; }
  let html = '';
  html += `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>&#8592;</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    } else if (i === currentPage - 2 || i === currentPage + 2) {
      html += `<span style="color: var(--text-secondary); padding: 0 4px;">...</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>&#8594;</button>`;
  container.innerHTML = html;
}

function updateStats() {
  const total = incidents.length;
  const open = incidents.filter(i => i.status === 'open').length;
  const solved = incidents.filter(i => i.status === 'solved').length;
  let totalHours = 0;
  let solvedCount = 0;
  incidents.forEach(inc => {
    if (inc.solved && inc.created) {
      const hours = (new Date(inc.solved) - new Date(inc.created)) / (1000 * 60 * 60);
      totalHours += hours;
      solvedCount++;
    }
  });
  const avg = solvedCount > 0 ? Math.round(totalHours / solvedCount) : 0;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statOpen').textContent = open;
  document.getElementById('statSolved').textContent = solved;
  document.getElementById('statAvgTime').textContent = avg + 'h';
}

// ===================== ACTIONS =====================
function solveIncident(id) {
  const inc = incidents.find(i => i.id === id);
  if (inc) {
    inc.status = 'solved';
    inc.solved = new Date().toISOString();
    renderTable();
    renderTeamStats();
    updateStats();
    showToast('success', 'Incident Solved', `"${inc.subject.substring(0, 40)}..." marked as solved.`);
  }
}

function deleteIncident(id) {
  if (confirm('Are you sure you want to delete this incident?')) {
    incidents = incidents.filter(i => i.id !== id);
    selectedIds.delete(id);
    renderTable();
    renderTeamStats();
    updateStats();
    showToast('info', 'Deleted', 'Incident removed from the system.');
  }
}

function reassign(id, newAssignee) {
  const inc = incidents.find(i => i.id === id);
  if (inc) {
    inc.assignee = newAssignee;
    renderTeamStats();
    showToast('info', 'Reassigned', `Incident assigned to ${teamMembers.find(m => m.id === newAssignee).name}`);
  }
}

function addIncident() {
  const subject = document.getElementById('newSubject').value.trim();
  const assignee = document.getElementById('newAssignee').value;
  const created = document.getElementById('newCreated').value;
  if (!subject) {
    showToast('info', 'Validation', 'Please enter a mail subject.');
    return;
  }
  const newId = Math.max(...incidents.map(i => i.id), 0) + 1;
  incidents.unshift({
    id: newId,
    subject: subject,
    assignee: assignee,
    created: created || new Date().toISOString(),
    solved: null,
    status: 'open'
  });
  closeAddModal();
  document.getElementById('newSubject').value = '';
  renderTable();
  renderTeamStats();
  updateStats();
  showToast('success', 'Incident Added', 'New incident has been logged.');
}

// ===================== BULK ACTIONS =====================
function toggleSelect(id) {
  if (selectedIds.has(id)) { selectedIds.delete(id); }
  else { selectedIds.add(id); }
  renderTable();
}

function toggleSelectAll() {
  const filtered = getFilteredIncidents();
  const allSelected = filtered.every(i => selectedIds.has(i.id));
  if (allSelected) { filtered.forEach(i => selectedIds.delete(i.id)); }
  else { filtered.forEach(i => selectedIds.add(i.id)); }
  renderTable();
}

function updateBulkActions() {
  const bulk = document.getElementById('bulkActions');
  const count = document.getElementById('bulkCount');
  const selectAll = document.getElementById('selectAll');
  if (selectedIds.size > 0) {
    bulk.classList.add('active');
    count.textContent = `${selectedIds.size} selected`;
  } else {
    bulk.classList.remove('active');
  }
  const filtered = getFilteredIncidents();
  const allSelected = filtered.length > 0 && filtered.every(i => selectedIds.has(i.id));
  selectAll.classList.toggle('checked', allSelected);
  selectAll.innerHTML = allSelected ? '&#10003;' : '';
}

function bulkSolve() {
  let count = 0;
  selectedIds.forEach(id => {
    const inc = incidents.find(i => i.id === id);
    if (inc && inc.status === 'open') {
      inc.status = 'solved';
      inc.solved = new Date().toISOString();
      count++;
    }
  });
  selectedIds.clear();
  renderTable();
  renderTeamStats();
  updateStats();
  showToast('success', 'Bulk Action', `${count} incidents marked as solved.`);
}

function clearSelection() {
  selectedIds.clear();
  renderTable();
}

// ===================== FILTERING & SORTING =====================
function filterIncidents() {
  currentPage = 1;
  renderTable();
}

function sortBy(field) {
  if (currentSort.field === field) {
    currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    currentSort.field = field;
    currentSort.dir = 'desc';
  }
  document.querySelectorAll('.sort-indicator').forEach(el => el.textContent = '&#8597;');
  const indicator = document.getElementById(`sort-${field}`);
  if (indicator) indicator.textContent = currentSort.dir === 'asc' ? '&#8593;' : '&#8595;';
  renderTable();
}

function goPage(page) {
  currentPage = page;
  renderTable();
}

// ===================== MODAL =====================
function openAddModal() {
  document.getElementById('addModal').classList.add('active');
}

function closeAddModal() {
  document.getElementById('addModal').classList.remove('active');
}

document.getElementById('addModal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});

// ===================== UTILITIES =====================
function formatDate(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function showToast(type, title, message) {
  const toast = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = type === 'success' ? '&#10003;' : '&#9670;';
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastMessage').textContent = message;
  toast.className = `toast toast-${type} show`;
  setTimeout(() => { toast.classList.remove('show'); }, 3000);
}

function exportCSV() {
  const filtered = getFilteredIncidents();
  const headers = ['ID', 'Subject', 'Assignee', 'Created', 'Solved', 'Status', 'Resolution Hours'];
  const rows = filtered.map(inc => {
    const assignee = teamMembers.find(m => m.id === inc.assignee)?.name || inc.assignee;
    let hours = '';
    if (inc.solved && inc.created) {
      hours = ((new Date(inc.solved) - new Date(inc.created)) / (1000 * 60 * 60)).toFixed(1);
    }
    return [inc.id, `"${inc.subject}"`, assignee, inc.created, inc.solved || '', inc.status, hours];
  });
  const csv = [headers, ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ir-incidents-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('success', 'Exported', `${filtered.length} incidents exported to CSV.`);
}

// ===================== START =====================
init();
</script>
